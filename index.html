<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas para Stacey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #ffeef8 0%, #fff5f7 50%, #f0f4ff 100%);
            min-height: 100vh;
            padding: 3rem 2rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Partículas flotantes de fondo */
        .particle {
            position: fixed;
            pointer-events: none;
            opacity: 0;
            animation: floatParticle 20s ease-in-out infinite;
            color: rgba(255, 182, 193, 0.3);
            font-size: 20px;
            z-index: 0;
        }

        @keyframes floatParticle {
            0%, 100% {
                transform: translate(0, 100vh) rotate(0deg) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            50% {
                transform: translate(var(--x), 30vh) rotate(180deg) scale(1);
                opacity: 0.3;
            }
            90% {
                opacity: 0.4;
            }
        }

        /* Container principal */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header principal */
        .header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 1.5s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .header-title {
            font-size: 3rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            letter-spacing: 3px;
            font-weight: normal;
            position: relative;
            display: inline-block;
        }

        .header-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(to right, transparent, #d4a5a5, transparent);
        }

        .header-subtitle {
            font-size: 1.2rem;
            color: #7f8c8d;
            font-style: italic;
            margin-top: 2rem;
            letter-spacing: 1px;
        }

        /* Grid de cartas */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            margin-bottom: 4rem;
        }

        /* Card individual */
        .card {
            background: white;
            border-radius: 15px;
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            animation: fadeInUp 1s ease-out backwards;
            border: 2px solid transparent;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(to right, #ffd6e8, #c8b6ff, #bfe3ff);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border-color: rgba(212, 165, 165, 0.3);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:nth-child(1) { animation-delay: 0.2s; }
        .card:nth-child(2) { animation-delay: 0.4s; }
        .card:nth-child(3) { animation-delay: 0.6s; }
        .card:nth-child(4) { animation-delay: 0.8s; }
        .card:nth-child(5) { animation-delay: 1s; }
        .card:nth-child(6) { animation-delay: 1.2s; }

        .card-icon {
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .card-date {
            font-size: 0.85rem;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            text-align: center;
        }

        .card-title {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: normal;
        }

        .card-description {
            font-size: 1rem;
            line-height: 1.8;
            color: #555;
            text-align: center;
            margin-bottom: 2rem;
            font-style: italic;
        }

        .card-button {
            display: block;
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #ffd6e8, #ffb3d9);
            color: #2c3e50;
            text-decoration: none;
            text-align: center;
            border-radius: 8px;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        .card-button:hover {
            background: linear-gradient(135deg, #ffb3d9, #ffd6e8);
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 182, 217, 0.4);
        }

        /* Card especial para próximas cartas */
        .card.coming-soon {
            background: linear-gradient(135deg, #fafafa, #f5f5f5);
            border: 2px dashed #d4a5a5;
            cursor: default;
        }

        .card.coming-soon:hover {
            transform: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border-color: #d4a5a5;
        }

        .card.coming-soon .card-button {
            background: #e0e0e0;
            color: #999;
            cursor: not-allowed;
        }

        .card.coming-soon .card-button:hover {
            transform: none;
            box-shadow: none;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 5rem;
            padding-top: 3rem;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .footer-text {
            font-size: 1rem;
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 1rem;
        }

        .footer-heart {
            font-size: 2rem;
            color: #c56c6c;
            animation: heartbeat 2s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.2);
            }
            50% {
                transform: scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 2rem 1rem;
            }

            .header-title {
                font-size: 2rem;
            }

            .header-subtitle {
                font-size: 1rem;
            }

            .cards-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        /* Indicador de nueva carta */
        .new-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            animation: bounceIn 1s ease-out;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <!-- Partículas de fondo -->
    <div id="particles"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-icon">💌</div>
            <h1 class="header-title">Cartas para Stacey</h1>
            <p class="header-subtitle">Cada carta es un pedazo de mi corazón para ti</p>
        </header>

        <!-- Grid de cartas (generado dinámicamente) -->
        <div class="cards-grid" id="cards-grid">
            <!-- Las cartas se generan automáticamente desde /api/cartas -->
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p class="footer-text">Con todo mi amor, siempre y para siempre</p>
            <div class="footer-heart">♡</div>
        </footer>
    </div>

    <script>
        // --- Partículas flotantes ---
        const particlesContainer = document.getElementById('particles');
        const particleSymbols = ['♡', '✿', '❀', '✾', '❁', '•', '○'];

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = particleSymbols[Math.floor(Math.random() * particleSymbols.length)];
            particle.style.left = Math.random() * 100 + '%';
            particle.style.fontSize = (Math.random() * 20 + 10) + 'px';
            particle.style.setProperty('--x', (Math.random() * 200 - 100) + 'px');
            particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particlesContainer.appendChild(particle);
            setTimeout(() => particle.remove(), 30000);
        }

        for (let i = 0; i < 20; i++) setTimeout(() => createParticle(), i * 300);
        setInterval(createParticle, 2000);

        // --- Generación dinámica de cartas ---
        const ICONS = ['🌸', '🌺', '🌹', '🌷', '💐', '🌻', '🪷', '🌼', '🏵️', '💮'];

        // Mes de inicio de la relación (octubre 2024 = mes 1)
        const BASE_DATE = new Date(2024, 9, 1); // octubre 2024

        const MESES_ES = [
            'Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
            'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'
        ];

        const NUMEROS_ES = [
            '', 'Un', 'Dos', 'Tres', 'Cuatro', 'Cinco', 'Seis',
            'Siete', 'Ocho', 'Nueve', 'Diez', 'Once', 'Doce'
        ];

        function getFechaLetra(mes) {
            const fecha = new Date(BASE_DATE.getFullYear(), BASE_DATE.getMonth() + mes, 1);
            return `${MESES_ES[fecha.getMonth()]} ${fecha.getFullYear()}`;
        }

        function getTituloMes(mes) {
            const texto = mes < NUMEROS_ES.length ? NUMEROS_ES[mes] : mes;
            return `${texto} Meses Juntos`;
        }

        function crearCard(mes, index, isLast) {
            const article = document.createElement('article');
            article.className = 'card';
            article.style.animationDelay = `${0.2 + index * 0.2}s`;

            const badgeHTML = isLast ? '<span class="new-badge">NUEVA ✨</span>' : '';

            article.innerHTML = `
                ${badgeHTML}
                <div class="card-icon">${ICONS[index % ICONS.length]}</div>
                <div class="card-date">${getFechaLetra(mes)}</div>
                <h2 class="card-title">${getTituloMes(mes)}</h2>
                <p class="card-description">
                    Cada mes escrito con amor, cada página un recuerdo que atesoro para siempre contigo.
                </p>
                <a href="/mes-${mes}" class="card-button">Leer Carta ❤</a>
            `;

            article.addEventListener('click', function(e) {
                if (!e.target.classList.contains('card-button')) {
                    window.location.href = `/mes-${mes}`;
                }
            });

            return article;
        }

        function crearCardProximamente() {
            const article = document.createElement('article');
            article.className = 'card coming-soon';
            article.innerHTML = `
                <div class="card-icon">🌿</div>
                <div class="card-date">Próximamente</div>
                <h2 class="card-title">Más Momentos</h2>
                <p class="card-description">
                    Cada mes trae nuevas historias, nuevas sonrisas,
                    y nuevas razones para amarte más.
                </p>
                <button class="card-button">Muy Pronto...</button>
            `;
            return article;
        }

        async function cargarCartas() {
            const grid = document.getElementById('cards-grid');
            try {
                const res = await fetch('/api/cartas');
                const meses = await res.json();

                meses.forEach((mes, index) => {
                    const isLast = index === meses.length - 1;
                    grid.appendChild(crearCard(mes, index, isLast));
                });

                grid.appendChild(crearCardProximamente());
            } catch (err) {
                console.error('Error cargando cartas:', err);
            }
        }

        cargarCartas();

        // --- Parallax suave ---
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.card');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            cards.forEach((card, index) => {
                const intensity = (index + 1) * 2;
                const moveX = (x - 0.5) * intensity;
                const moveY = (y - 0.5) * intensity;
                if (!card.matches(':hover')) {
                    card.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }
            });
        });
    </script>
</body>
</html>
